repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: radon-complexity
        name: Radon complexity gate (no block below C)
        language: system
        entry: bash -c 'uvx radon cc awair/ -n C --total-average | grep -E "^[A-Z]" && exit 0 || exit 1'
        pass_filenames: false
        types: [python]
