# Claude Code review gate: an independent reviewer (not the PR author) reads
# every PR's diff and posts inline findings. All four config layers from the
# claude-code-action setup are present: id-token (OIDC), --allowedTools,
# track_progress (registers the inline-comment MCP server), and allowed_bots
# (agent-authored PRs are the common case in this repo).
name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  # claude-code-action mints its GitHub App token by exchanging a GitHub OIDC
  # token, so the job needs id-token: write even though a Claude OAuth token
  # is passed too. Missing => "Could not fetch an OIDC token."
  id-token: write

jobs:
  claude-review:
    runs-on: ubuntu-latest
    # Actions can't post inline comments back to the base repo for fork PRs
    # (a GitHub security boundary). Skip them rather than red-X.
    if: ${{ github.event.pull_request.head.repo.fork == false }}
    steps:
      # Secret-gate: clean green no-op until the token secret exists — no red X
      # on every PR while the gate is being set up.
      - name: Check reviewer token is configured
        id: gate
        env:
          TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "ready=yes" >> "$GITHUB_OUTPUT"
          else
            echo "ready=no" >> "$GITHUB_OUTPUT"
            echo "::notice::CLAUDE_CODE_OAUTH_TOKEN not set — review skipped. Add the secret to enable the gate."
          fi

      - if: steps.gate.outputs.ready == 'yes'
        uses: actions/checkout@v4

      - if: steps.gate.outputs.ready == 'yes'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Registers the github_inline_comment MCP server (+ a live tracking
          # comment). Without it the inline-comment tool is denied even when
          # allow-listed: --allowedTools only FILTERS registered servers.
          track_progress: true
          # PRs here are usually opened by the dispatch bot; the action blocks
          # bot actors by default. Fork PRs are excluded above.
          allowed_bots: "*"
          claude_args: >-
            --allowedTools
            "mcp__github_inline_comment__create_inline_comment,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*)"
            --max-turns 25
          prompt: |
            You are an independent reviewer of this pull request — you did NOT
            write the diff. Review it for real defects a careful reviewer would
            catch in one sitting. Read the enclosing function of each hunk, not
            just the changed lines.

            Repo context: a Python air-quality poller (Awair Element device ->
            SQLite -> ntfy alerts -> fan control). Detection logic in
            awair/spikes.py is pure functions over passed-in state; awair/db.py
            owns all SQLite; awair/monitor.py is the glue. SCOPE.md documents
            the alerting rules — flag any diff that contradicts it. Tests are
            TDD-style; production changes without a matching test are a finding.

            Prioritise correctness bugs (inverted conditions, off-by-one,
            None on a reachable path, wrong-variable copy-paste, swallowed
            errors, timezone-naive datetimes), then silent-drop bugs (data
            assigned where it should accumulate; unconditional overwrites),
            then removed-behavior regressions (name the invariant a deleted
            line enforced and confirm it's re-established), then convention
            violations from CLAUDE.md and SCOPE.md.

            Post each finding as an inline comment on the exact line using the
            mcp__github_inline_comment__create_inline_comment tool, with a
            concrete failure scenario (inputs/state -> wrong output). Do not
            invent issues; if the diff is clean, post one brief top-level
            `gh pr comment` saying so. Skip pure style nits.
